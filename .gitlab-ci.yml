stages:
  - build
  - upload
  - release
  - predelivery

include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml

variables:
  PACKAGE_VERSION : $CI_COMMIT_TAG
  PAYLINE_ZIP_PACKAGE: "woocommerce-payline-v${PACKAGE_VERSION}.zip"
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/woocommerce-payline-release/${PACKAGE_VERSION}"

# Cache for dependencies
cache:
  paths:
    - node_modules/

#######
# Build
#######
build_job:
  stage: build
  image: node:20-buster
  script:
    - npm install
    - npm run build:webpack
    - npm run release:gitlab
    - mv payline.zip $PAYLINE_ZIP_PACKAGE
  artifacts:
    paths:
      - $PAYLINE_ZIP_PACKAGE
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG

upload:
  stage: upload
  image: curlimages/curl:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - build_job
  script:
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file $PAYLINE_ZIP_PACKAGE "${PACKAGE_REGISTRY_URL}/${PAYLINE_ZIP_PACKAGE}"

# Release stage
release_job:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - echo "Creating release $CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - upload
  release:
    name: "Release $CI_COMMIT_TAG "
    description: "For additionnal information please read the CHANGELOG."
    tag_name: $CI_COMMIT_TAG
    ref: $CI_COMMIT_SHA
    assets:
      links:
        - name: woocommerce-payline-$CI_COMMIT_TAG (zip)
          url: "${PACKAGE_REGISTRY_URL}/${PAYLINE_ZIP_PACKAGE}"
          link_type: package

#######
# Scans
#######
dependency-track-sbom:
  stage: predelivery
  image:
    name: composer:2.6
    entrypoint: [""]
  variables:
    BOM_FILE: "bom.xml"
  before_script:
    - apk add --no-cache libxml2-dev
    - docker-php-ext-install soap
    - composer install --no-interaction --no-progress
  script:
    - echo "Generating CycloneDX SBOM..."
    - composer CycloneDX:make-sbom --output-format xml --output-file $BOM_FILE
    - echo "Uploading BOM to Dependency-Track..."
    - |
      curl -X "POST" "https://dtapi.dgarde.tbdgroup.dev/api/v1/bom" \
      -H "Content-Type: multipart/form-data" \
      -H "X-Api-Key: ${DTRACK_API_KEY}" \
      -F "autoCreate=true" \
      -F "isLatest=true" \
      -F "projectName=${CI_PROJECT_NAME}" \
      -F "projectVersion=${CI_COMMIT_TITLE}" \
      -F "bom=@${BOM_FILE}"
      #-F "project=$PROJECT_UUID" \
      #for projetVersion, can be used : $CI_COMMIT_TITLE, $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME, $CI_MERGE_REQUEST_TITLE
  allow_failure: false
  rules:
    - if: '$CI_COMMIT_BRANCH == "predelivery"'
#  when: manual

sonarqube-scan:
  stage: predelivery
  image:
    name: sonarsource/sonar-scanner-cli:10
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  cache:
    policy: pull-push
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - "${SONAR_USER_HOME}/cache"
      - sonar-scanner/
  script:
    - |
      sonar-scanner \
      -Dsonar.host.url="${SONAR_HOST_URL}" \
      -Dsonar.projectKey="${SONAR_PROJECT_KEY}" \
      -Dsonar.projectVersion="${CI_COMMIT_TITLE}" \
      -Dsonar.token="${SONAR_TOKEN}"
      #for projetVersion, can be used : $CI_COMMIT_TITLE, $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME, $CI_MERGE_REQUEST_TITLE
  allow_failure: false
  rules:
    - if: '$CI_COMMIT_BRANCH == "predelivery"'
#  when: manual

secret_detection:
  stage: predelivery
  allow_failure: false
  rules:
    - if: '$CI_COMMIT_BRANCH == "predelivery"'
#  when: manual