name: Build for release

on:
#  push:
#    tags:
#      - '*'
#    branches:
#      - github_action
  release:
    types:
      - [created]  # Déclenchement lors de la création d'une release

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: Setup node version
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: List files
        run: ls -lisa

      - name: Zip fix
        run: rm -rf ./release && mkdir release && unzip woocommerce-gateway-payline.zip -d ./release/payline

      - name: Use the Upload Artifact GitHub Action
        uses: actions/upload-artifact@v4
        with:
          name: woocommerce-payline-v
          path: ./release
          retention-days: 1

