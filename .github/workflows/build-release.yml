name: Build package
on:
  release:
    types: [published]

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🔧 Setup environment
        uses: ./.github/actions/setup-env

      - name: 📦 Build project
        run: npm run build

      - name: Rename
        run: mv woocommerce-gateway-payline.zip woocommerce-payline_v${{ github.ref_name }}.zip

      - name: Upload asset using gh CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZIP_PATH: woocommerce-payline_v${{ github.ref_name }}.zip
        run: gh release upload ${{ github.event.release.tag_name }} $ZIP_PATH